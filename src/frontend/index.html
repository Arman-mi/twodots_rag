<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TwoDots Chat</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>TwoDots Site Chat</h1>
      <p>Ask questions grounded only in twodots.net</p>
    </header>

    <main id="chat" class="chat"></main>

    <form id="chat-form" class="input-bar">
      <input
        id="message-input"
        type="text"
        placeholder="Ask a question about Two Dots..."
        autocomplete="off"
        required
      />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="./app.js"></script>
</body>
</html>
